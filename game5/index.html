<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <link rel="stylesheet" href="../shared/shared.css">
  <link rel="stylesheet" href="game5.css">
</head>
<body>

  <!-- Star field background canvas -->
  <canvas id="star-canvas"></canvas>

  <!-- Page heading -->
  <header>
    <span class="header-emoji">🐱</span>
    <h1></h1>
    <p class="subtitle"></p>
  </header>

  <!-- Score bar: label + progress track + numeric score -->
  <div id="score-bar">
    <span class="score-label" id="lbl-score"></span>
    <div id="progress-track"><div id="progress-fill"></div></div>
    <span id="score-num"></span>
  </div>

  <!-- Game canvas + red hit-flash overlay -->
  <div id="canvas-wrap">
    <canvas id="gameCanvas" width="860" height="380"></canvas>
    <div id="hit-flash"></div>
  </div>

  <!-- Jump hint (fades out when game starts) -->
  <p id="tap-hint"></p>

  <!-- Back navigation only (win navigates automatically to final.html) -->
  <button class="nav-btn nav-back" id="nav-back"></button>

  <script src="../shared/stars.js"></script>
  <script src="game5.js"></script>
</body>
</html>
