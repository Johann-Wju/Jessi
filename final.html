<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herzlichen Glückwunsch, Jessi! 🎉</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0d0008;
      font-family: 'Segoe UI', sans-serif;
    }

    /* Particle canvas sits behind everything */
    #bg-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* Central card */
    #card {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      z-index: 10;
      padding: 40px 24px;
      text-align: center;
    }

    /* Glowing ring behind card content */
    .ring {
      position: absolute;
      width: min(540px, 90vw);
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(233,30,140,.12) 0%,
        rgba(255,105,180,.06) 40%,
        transparent 70%);
      filter: blur(30px);
      animation: ring-pulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes ring-pulse {
      0%, 100% { transform: scale(0.95); opacity: .7; }
      50%       { transform: scale(1.08); opacity: 1; }
    }

    /* Emoji row */
    .emoji-row {
      font-size: 2.8rem;
      letter-spacing: 8px;
      margin-bottom: 20px;
      animation: float-row 2.8s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(255,105,180,.7));
      opacity: 0;
      animation: fade-up .8s .2s forwards, float-row 2.8s .2s ease-in-out infinite;
    }

    /* "Herzlichen Glückwunsch" heading */
    .congrats {
      font-size: clamp(1.4rem, 5vw, 2.8rem);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ff69b4, #e91e8c, #ff9de2, #ffb3d9);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite, fade-up .8s .5s both;
      margin-bottom: 8px;
    }
    @keyframes shimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Name */
    .name {
      font-size: clamp(3.5rem, 12vw, 7rem);
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 10%, #ffb3d9 40%, #e91e8c 70%, #ff9de2 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite, fade-up .9s .7s both;
      filter: drop-shadow(0 0 30px rgba(233,30,140,.5));
      margin-bottom: 32px;
    }

    /* Message box */
    .message-box {
      position: relative;
      max-width: min(620px, 92vw);
      background: rgba(255,105,180,.06);
      border: 1.5px solid rgba(255,105,180,.25);
      border-radius: 20px;
      padding: 28px 36px;
      backdrop-filter: blur(10px);
      box-shadow:
        0 0 0 1px rgba(255,105,180,.07),
        0 8px 40px rgba(233,30,140,.2),
        inset 0 1px 0 rgba(255,255,255,.06);
      animation: fade-up 1s .9s both;
      margin-bottom: 30px;
    }

    .message-box::before,
    .message-box::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }
    .message-box::before {
      width: 120px; height: 120px;
      top: -40px; right: -30px;
      background: radial-gradient(circle, rgba(255,105,180,.2), transparent 70%);
      filter: blur(10px);
    }
    .message-box::after {
      width: 80px; height: 80px;
      bottom: -25px; left: -20px;
      background: radial-gradient(circle, rgba(233,30,140,.2), transparent 70%);
      filter: blur(8px);
    }

    /* Placeholder text hint */
    .msg-hint {
      font-size: .72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,105,180,.4);
      margin-bottom: 10px;
    }

    /* ← Replace this paragraph with your own message */
    .msg-text {
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      line-height: 1.75;
      color: rgba(255,220,240,.92);
      font-style: italic;
      letter-spacing: .3px;
      white-space: pre-line;
    }

    /* Divider */
    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, #e91e8c, transparent);
      margin: 14px auto;
      border-radius: 99px;
    }

    /* Stars row */
    .star-row {
      font-size: 1.4rem;
      letter-spacing: 6px;
      color: rgba(255,105,180,.7);
      animation: fade-up 1s 1.1s both;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes float-row {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div id="card">
    <div class="ring"></div>

    <div class="emoji-row">🎂 🐱 🎉 🌸 ✨</div>

    <div class="congrats">Herzlichen Glückwunsch</div>
    <div class="name">Jessi!</div>

    <div class="message-box">
      <div class="msg-hint">Nachricht</div>
      <div class="divider"></div>
      <!-- ✏️ HIER DEINE NACHRICHT EINTRAGEN ↓ -->
      <p class="msg-text">
Deine persönliche Geburtstagsnachricht kommt hier hin.
Einfach diesen Text ersetzen. 🎀
      </p>
      <!-- ↑ HIER DEINE NACHRICHT EINTRAGEN ✏️ -->
      <div class="divider"></div>
    </div>

    <div class="star-row">★ ★ ★ ★ ★</div>
  </div>

  <script>
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // ── Particle system ────────────────────────────────────────────────────────
  const COLORS = [
    'rgba(255,105,180,A)', 'rgba(233,30,140,A)', 'rgba(255,182,220,A)',
    'rgba(255,255,255,A)', 'rgba(255,230,240,A)', 'rgba(255,140,200,A)',
    'rgba(200,80,180,A)',  'rgba(255,200,230,A)',
  ];

  function mkColor(template, a) {
    return template.replace('A', a.toFixed(2));
  }

  class Particle {
    constructor(burst) {
      this.reset(burst);
    }
    reset(burst) {
      const cx = burst ? burst.x : Math.random() * canvas.width;
      const cy = burst ? burst.y : -10;
      const spread = burst ? 1 : 0;

      this.x  = cx + (Math.random() - .5) * 60 * spread;
      this.y  = cy + (Math.random() - .5) * 60 * spread;
      this.r  = Math.random() * 5 + 2;
      this.vx = burst
        ? (Math.random() - .5) * 12
        : (Math.random() - .5) * 1.2;
      this.vy = burst
        ? (Math.random() - .5) * 12 - 4
        : Math.random() * 2.5 + 0.8;
      this.gravity = burst ? 0.18 : 0;
      this.life  = 1;
      this.decay = burst
        ? Math.random() * 0.014 + 0.008
        : Math.random() * 0.004 + 0.002;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.shape = Math.random() < 0.4 ? 'rect' : 'circle';
      this.rot   = Math.random() * Math.PI * 2;
      this.rotV  = (Math.random() - .5) * 0.2;
      this.w = this.r * (1 + Math.random());
      this.h = this.r * (0.5 + Math.random() * 0.5);
    }
    update() {
      this.x  += this.vx;
      this.y  += this.vy;
      this.vy += this.gravity;
      this.vx *= 0.99;
      this.rot += this.rotV;
      this.life -= this.decay;
    }
    draw() {
      if (this.life <= 0) return;
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.life);
      ctx.fillStyle   = mkColor(this.color, Math.max(0, this.life));
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      if (this.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(0, 0, this.r, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
      }
      ctx.restore();
    }
  }

  // Steady rain of confetti from top
  const particles = Array.from({length: 90}, () => {
    const p = new Particle(null);
    p.y = Math.random() * canvas.height; // pre-scatter on load
    return p;
  });

  // Burst fireworks
  function burst(x, y, n = 60) {
    for (let i = 0; i < n; i++) particles.push(new Particle({x, y}));
  }

  // Periodic fireworks
  function scheduleFirework() {
    const x = 0.1 * canvas.width + Math.random() * 0.8 * canvas.width;
    const y = 0.15 * canvas.height + Math.random() * 0.45 * canvas.height;
    burst(x, y, 80);
    setTimeout(scheduleFirework, 1200 + Math.random() * 1800);
  }
  setTimeout(scheduleFirework, 600);
  setTimeout(scheduleFirework, 1800);

  // ── Floating hearts ────────────────────────────────────────────────────────
  const HEARTS = ['🩷','💗','💕','🌸','✨','⭐','🎀','💖','🌟'];
  class Heart {
    constructor() { this.reset(); }
    reset() {
      this.x    = Math.random() * canvas.width;
      this.y    = canvas.height + 30;
      this.size = 14 + Math.random() * 20;
      this.vy   = -(Math.random() * 1.2 + 0.5);
      this.vx   = (Math.random() - .5) * 0.6;
      this.life = 1;
      this.decay= 0.003 + Math.random() * 0.003;
      this.char = HEARTS[Math.floor(Math.random() * HEARTS.length)];
      this.rot  = (Math.random() - .5) * 0.3;
      this.rotV = (Math.random() - .5) * 0.01;
    }
    update() {
      this.x   += this.vx;
      this.y   += this.vy;
      this.rot += this.rotV;
      this.life -= this.decay;
    }
    draw() {
      if (this.life <= 0) return;
      ctx.save();
      ctx.globalAlpha = Math.max(0, this.life * 0.8);
      ctx.font = `${this.size}px serif`;
      ctx.textAlign = 'center';
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.fillText(this.char, 0, 0);
      ctx.restore();
    }
  }

  const hearts = Array.from({length: 18}, () => {
    const h = new Heart();
    h.y = Math.random() * canvas.height;
    return h;
  });

  // ── Background gradient pulse ──────────────────────────────────────────────
  let bgPhase = 0;

  // ── Main render loop ───────────────────────────────────────────────────────
  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Subtle animated radial bg
    bgPhase += 0.008;
    const pulse = 0.5 + 0.5 * Math.sin(bgPhase);
    const bg = ctx.createRadialGradient(
      canvas.width/2, canvas.height/2, 0,
      canvas.width/2, canvas.height/2, canvas.width * 0.7
    );
    bg.addColorStop(0, `rgba(60,0,40,${(0.18 + pulse*0.08).toFixed(3)})`);
    bg.addColorStop(0.5, `rgba(30,0,20,${(0.12 + pulse*0.05).toFixed(3)})`);
    bg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Confetti
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.update();
      p.draw();
      if (p.life <= 0) {
        if (i < 90) {
          p.reset(null); // recycle steady rain particles
        } else {
          particles.splice(i, 1); // remove burst particles
        }
      }
    }

    // Hearts
    hearts.forEach(h => {
      h.update();
      h.draw();
      if (h.life <= 0) h.reset();
    });

    requestAnimationFrame(loop);
  }

  loop();
  </script>
</body>
</html>
