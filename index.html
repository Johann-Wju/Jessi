<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alles Gute, Jessi! 🎉</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="overlay"></div>
  <div id="cursor-ring"></div>
  <div id="cursor-dot"></div>

  <div id="icons-container"></div>

  <div id="toast" class="toast hidden">
    <span id="toast-text"></span>
  </div>

  <p id="hint">Finde die Katze&nbsp;🔦</p>

  <!-- Win overlay (same design as all other games) -->
  <div id="win-screen">
    <div class="ws-emoji">🐱</div>
    <div class="ws-title">Du hast sie gefunden!</div>
    <p class="ws-sub">Bereit fürs Memory?</p>
    <button class="ws-btn" onclick="navigate('game.html')">Zum Memory&nbsp;→</button>
  </div>

  <!-- Navigation -->
  <button class="nav-btn nav-fwd" onclick="navigate('game.html')">Weiter&nbsp;→</button>

  <script src="script.js"></script>
</body>
</html>
