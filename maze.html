<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labyrinth – Jessi! 🐱</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0008;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      overflow: hidden;
      padding: 16px 16px 70px;
    }

    header { text-align: center; }

    .header-emoji {
      font-size: 2.6rem;
      display: block;
      margin-bottom: 4px;
      filter: drop-shadow(0 0 18px rgba(255,105,180,.55));
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e91e8c, #ff9de2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      margin-top: 4px;
      color: rgba(255,182,220,.5);
      font-size: .8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #maze-wrap {
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 0 0 2px rgba(255,105,180,.28),
        0 0 50px rgba(255,105,180,.14),
        0 0 90px rgba(233,30,140,.07);
    }

    canvas#maze { display: block; }

    .controls {
      color: rgba(255,182,220,.38);
      font-size: .72rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Nav buttons (identical to all other pages) ── */
    .nav-btn {
      position: fixed; bottom: 22px; z-index: 500;
      background: rgba(255,105,180,.08);
      border: 1.5px solid rgba(255,105,180,.3);
      color: rgba(255,182,220,.75);
      padding: 10px 22px; border-radius: 50px;
      font-size: .88rem; font-weight: 600;
      cursor: pointer; letter-spacing: .5px;
      transition: background .2s, border-color .2s, transform .15s;
      backdrop-filter: blur(6px);
    }
    .nav-btn:hover {
      background: rgba(255,105,180,.2);
      border-color: rgba(255,105,180,.65);
      transform: translateY(-2px);
    }
    .nav-back { left: 22px; }
    .nav-fwd  { right: 22px; }

    /* ── Win screen (same design as all other games) ── */
    #win-screen {
      display: none;
      position: fixed; inset: 0;
      background: rgba(13,0,8,.95);
      z-index: 400;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; text-align: center; padding: 40px;
    }
    #win-screen.visible {
      display: flex;
      animation: ws-appear .45s ease forwards;
    }
    .ws-emoji {
      font-size: 5rem;
      animation: ws-bounce 1.2s ease-in-out infinite;
      filter: drop-shadow(0 0 22px rgba(255,105,180,.6));
    }
    .ws-title {
      font-size: 2.4rem; font-weight: 800;
      background: linear-gradient(135deg, #e91e8c, #ff9de2);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .ws-sub { color: rgba(255,182,220,.6); font-size: 1rem; letter-spacing: 1px; }
    .ws-btn {
      margin-top: 8px;
      background: linear-gradient(135deg, #e91e8c, #ff6fa8);
      color: #fff; border: none;
      padding: 14px 40px; border-radius: 50px;
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 20px rgba(233,30,140,.5);
      transition: transform .15s;
    }
    .ws-btn:hover { transform: translateY(-2px); }
    .ws-btn-ghost {
      background: transparent;
      border: 1.5px solid rgba(255,105,180,.4);
      color: rgba(255,182,220,.8);
      padding: 10px 28px; border-radius: 50px;
      font-size: .95rem; font-weight: 600; cursor: pointer;
      transition: border-color .2s;
    }
    .ws-btn-ghost:hover { border-color: rgba(255,105,180,.8); }

    @keyframes ws-appear {
      from { opacity: 0; transform: scale(.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes ws-bounce {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-18px); }
    }
  </style>
</head>
<body>

  <header>
    <span class="header-emoji">🐱</span>
    <h1>Labyrinth-Flucht</h1>
    <p class="subtitle">Finde den Ausgang&nbsp;✨</p>
  </header>

  <div id="maze-wrap"><canvas id="maze"></canvas></div>

  <p class="controls">W A S D &nbsp;·&nbsp; Katze bewegen</p>

  <!-- Win screen -->
  <div id="win-screen">
    <div class="ws-emoji">🎉</div>
    <div class="ws-title">Ausgang gefunden!</div>
    <p class="ws-sub">Die Katze ist frei! 🐱✨</p>
    <button class="ws-btn" onclick="navigate('runner.html')">Weiter&nbsp;→</button>
    <button class="ws-btn-ghost" onclick="resetMaze()">Neues Labyrinth&nbsp;🔄</button>
  </div>

  <!-- Navigation -->
  <button class="nav-btn nav-back" onclick="navigate('wheel.html')">←&nbsp;Zurück</button>
  <button class="nav-btn nav-fwd"  onclick="navigate('runner.html')">Weiter&nbsp;→</button>

  <script>
    // ── Grid dimensions ────────────────────────────────────────────────────────
    const COLS = 15;
    const ROWS = 11;

    // Adaptive cell size: fill available space without overflowing
    const availW = Math.min(window.innerWidth  - 32, 680);
    const availH = Math.min(window.innerHeight * 0.60, 500);
    const CELL   = Math.min(44, Math.max(22, Math.floor(Math.min(availW / COLS, availH / ROWS))));
    const W = COLS * CELL;
    const H = ROWS * CELL;

    const canvas = document.getElementById('maze');
    canvas.width  = W;
    canvas.height = H;
    const ctx = canvas.getContext('2d');

    // ── Maze data ─────────────────────────────────────────────────────────────
    // Each cell: walls = [top, right, bottom, left]  (true = wall present)
    let cells;

    function buildMaze() {
      cells = Array.from({length: ROWS}, () =>
        Array.from({length: COLS}, () => ({ walls: [true,true,true,true], visited: false }))
      );

      // Iterative depth-first / recursive-backtracking
      const DIRS = [
        {dx: 0, dy:-1, w:0, ow:2},
        {dx: 1, dy: 0, w:1, ow:3},
        {dx: 0, dy: 1, w:2, ow:0},
        {dx:-1, dy: 0, w:3, ow:1},
      ];

      const stack = [{x:0, y:0}];
      cells[0][0].visited = true;

      while (stack.length) {
        const {x, y} = stack[stack.length - 1];

        const nbrs = DIRS
          .map(d => ({nx: x+d.dx, ny: y+d.dy, w: d.w, ow: d.ow}))
          .filter(({nx, ny}) => nx>=0 && nx<COLS && ny>=0 && ny<ROWS && !cells[ny][nx].visited);

        if (!nbrs.length) { stack.pop(); continue; }

        const {nx, ny, w, ow} = nbrs[Math.floor(Math.random() * nbrs.length)];
        cells[y][x].walls[w]    = false;
        cells[ny][nx].walls[ow] = false;
        cells[ny][nx].visited   = true;
        stack.push({x: nx, y: ny});
      }
    }

    // ── Player ─────────────────────────────────────────────────────────────────
    let player = {x: 0, y: 0};
    let won    = false;

    function tryMove(dx, dy) {
      if (won) return;
      const wallIdx = dy===-1 ? 0 : dx===1 ? 1 : dy===1 ? 2 : 3;
      if (cells[player.y][player.x].walls[wallIdx]) return;
      player.x += dx;
      player.y += dy;
      if (player.x === COLS-1 && player.y === ROWS-1) {
        won = true;
        setTimeout(() => document.getElementById('win-screen').classList.add('visible'), 450);
      }
    }

    // ── Keyboard ──────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      switch (e.key.toLowerCase()) {
        case 'w': case 'arrowup':    tryMove( 0,-1); e.preventDefault(); break;
        case 's': case 'arrowdown':  tryMove( 0, 1); e.preventDefault(); break;
        case 'a': case 'arrowleft':  tryMove(-1, 0); e.preventDefault(); break;
        case 'd': case 'arrowright': tryMove( 1, 0); e.preventDefault(); break;
      }
    });

    // ── Touch / swipe ─────────────────────────────────────────────────────────
    let touchX = null, touchY = null;
    canvas.addEventListener('touchstart', e => {
      touchX = e.touches[0].clientX;
      touchY = e.touches[0].clientY;
      e.preventDefault();
    }, {passive: false});
    canvas.addEventListener('touchend', e => {
      if (touchX === null) return;
      const dx = e.changedTouches[0].clientX - touchX;
      const dy = e.changedTouches[0].clientY - touchY;
      if (Math.abs(dx) > Math.abs(dy)) {
        dx > 0 ? tryMove(1,0) : tryMove(-1,0);
      } else {
        dy > 0 ? tryMove(0,1) : tryMove(0,-1);
      }
      touchX = touchY = null;
      e.preventDefault();
    }, {passive: false});

    // ── Rendering ─────────────────────────────────────────────────────────────
    let exitPulse = 0;

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Dark background
      ctx.fillStyle = '#0d0008';
      ctx.fillRect(0, 0, W, H);

      // Subtle floor tiles
      ctx.fillStyle = 'rgba(255,105,180,0.025)';
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          ctx.fillRect(x*CELL+1, y*CELL+1, CELL-2, CELL-2);
        }
      }

      // Exit pulsing glow
      const ex = (COLS - 0.5) * CELL;
      const ey = (ROWS - 0.5) * CELL;
      const gr = CELL * (1.4 + exitPulse * 0.5);
      const grd = ctx.createRadialGradient(ex, ey, 0, ex, ey, gr);
      grd.addColorStop(0, `rgba(233,30,140,${0.28 + exitPulse * 0.18})`);
      grd.addColorStop(1, 'transparent');
      ctx.fillStyle = grd;
      ctx.fillRect(ex - gr, ey - gr, gr*2, gr*2);

      // Start glow
      const startGrd = ctx.createRadialGradient(CELL*0.5, CELL*0.5, 0, CELL*0.5, CELL*0.5, CELL);
      startGrd.addColorStop(0, 'rgba(255,182,220,0.1)');
      startGrd.addColorStop(1, 'transparent');
      ctx.fillStyle = startGrd;
      ctx.fillRect(0, 0, CELL*2, CELL*2);

      // Walls — draw each segment once (top + left per cell, plus right/bottom borders)
      ctx.strokeStyle = 'rgba(255,105,180,0.88)';
      ctx.lineWidth   = CELL > 32 ? 2.5 : 1.8;
      ctx.shadowColor = 'rgba(255,105,180,0.55)';
      ctx.shadowBlur  = CELL > 32 ? 6 : 4;
      ctx.lineCap     = 'square';

      ctx.beginPath();
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const {walls} = cells[y][x];
          const px = x * CELL, py = y * CELL;
          if (walls[0]) { ctx.moveTo(px, py);       ctx.lineTo(px+CELL, py);      } // top
          if (walls[3]) { ctx.moveTo(px, py);       ctx.lineTo(px, py+CELL);      } // left
          if (x === COLS-1 && walls[1]) { ctx.moveTo(px+CELL, py); ctx.lineTo(px+CELL, py+CELL); }
          if (y === ROWS-1 && walls[2]) { ctx.moveTo(px, py+CELL); ctx.lineTo(px+CELL, py+CELL); }
        }
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Exit marker
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `${Math.round(CELL * 0.70)}px sans-serif`;
      ctx.fillText('✨', ex, ey);

      // Player (placeholder cat)
      ctx.shadowColor = 'rgba(255,105,180,0.75)';
      ctx.shadowBlur  = CELL > 32 ? 16 : 10;
      ctx.font = `${Math.round(CELL * 0.76)}px sans-serif`;
      ctx.fillText('🐱', (player.x + 0.5) * CELL, (player.y + 0.5) * CELL);
      ctx.shadowBlur = 0;
    }

    // ── Animation loop ─────────────────────────────────────────────────────────
    function loop(ts) {
      exitPulse = Math.sin(ts / 700) * 0.5 + 0.5;
      draw();
      requestAnimationFrame(loop);
    }

    // ── Reset ─────────────────────────────────────────────────────────────────
    function resetMaze() {
      won    = false;
      player = {x: 0, y: 0};
      document.getElementById('win-screen').classList.remove('visible');
      buildMaze();
    }

    // ── Navigate ──────────────────────────────────────────────────────────────
    function navigate(url) {
      document.body.style.transition = 'opacity .35s';
      document.body.style.opacity    = '0';
      setTimeout(() => { window.location.href = url; }, 360);
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    buildMaze();
    requestAnimationFrame(loop);
  </script>

</body>
</html>
