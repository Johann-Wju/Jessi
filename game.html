<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory – Alles Gute, Jessi!</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0008;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 20px 40px;
      gap: 18px;
    }

    /* ── Header ─────────────────────────────────────────── */
    header { text-align: center; }

    .header-emoji {
      font-size: 3.2rem;
      display: block;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 18px rgba(255, 105, 180, 0.55));
    }

    h1 {
      font-size: 1.6rem;
      background: linear-gradient(135deg, #e91e8c, #ff9de2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
    }

    .subtitle {
      margin-top: 5px;
      color: rgba(255, 182, 220, 0.5);
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── Stats bar ──────────────────────────────────────── */
    .stats {
      display: flex;
      gap: 36px;
      font-size: 0.9rem;
      color: rgba(255, 182, 220, 0.6);
      letter-spacing: 1px;
    }

    .stats strong {
      color: #ff69b4;
      font-size: 1.15rem;
    }

    /* ── Card grid ──────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      width: 100%;
      max-width: 500px;
    }

    /* ── Single card ────────────────────────────────────── */
    .card {
      aspect-ratio: 1;
      perspective: 700px;
      cursor: pointer;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.42s cubic-bezier(.4, 0, .2, 1);
    }

    .card.flipped  .card-inner,
    .card.matched  .card-inner { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* back side (face-down) */
    .card-back {
      background: linear-gradient(145deg, #28001a, #480030);
      border: 2px solid rgba(255, 105, 180, 0.22);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.55);
      transition: border-color .2s, box-shadow .2s;
    }

    .card-back-inner {
      width: 54%;
      height: 54%;
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(255,105,180,.12), rgba(255,105,180,.04));
      border: 1.5px solid rgba(255, 105, 180, 0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: rgba(255, 105, 180, 0.45);
    }

    .card:not(.matched):not(.flipped):hover .card-back {
      border-color: rgba(255, 105, 180, 0.6);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 18px rgba(255, 105, 180, 0.22);
    }

    /* front side (face-up) */
    .card-front {
      background: linear-gradient(145deg, #1c000f, #30001e);
      border: 2px solid rgba(255, 105, 180, 0.45);
      transform: rotateY(180deg);
      font-size: 2rem;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.55);
    }

    /* matched glow */
    .card.matched .card-front {
      border-color: rgba(255, 105, 180, 0.9);
      box-shadow:
        0 4px 14px rgba(0, 0, 0, 0.5),
        0 0 28px rgba(255, 105, 180, 0.45),
        inset 0 0 18px rgba(255, 105, 180, 0.08);
    }

    /* ── Win overlay ────────────────────────────────────── */
    #win-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13, 0, 8, 0.93);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-align: center;
      padding: 40px;
    }

    #win-screen.visible { display: flex; }

    .win-emoji {
      font-size: 5rem;
      animation: bounce 1.2s ease-in-out infinite;
      filter: drop-shadow(0 0 22px rgba(255, 105, 180, 0.6));
    }

    .win-title {
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #e91e8c, #ff9de2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .win-sub {
      color: rgba(255, 182, 220, 0.6);
      font-size: 1rem;
      letter-spacing: 1px;
    }

    .win-sub strong { color: #ff69b4; }

    #btn-next {
      margin-top: 8px;
      background: linear-gradient(135deg, #e91e8c, #ff6fa8);
      color: #fff; border: none;
      padding: 14px 40px; border-radius: 50px;
      font-size: 1.1rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 20px rgba(233,30,140,.5);
      transition: transform .15s;
    }
    #btn-next:hover { transform: translateY(-2px); }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-18px); }
    }

    /* ── Responsive ─────────────────────────────────────── */
    @media (max-width: 420px) {
      #grid { gap: 8px; }
      .card-front { font-size: 1.5rem; }
    }

    /* ── Nav buttons ── */
    .nav-btn {
      position: fixed; bottom: 22px; z-index: 500;
      background: rgba(255,105,180,.08);
      border: 1.5px solid rgba(255,105,180,.3);
      color: rgba(255,182,220,.75);
      padding: 10px 22px; border-radius: 50px;
      font-size: .88rem; font-weight: 600;
      cursor: pointer; letter-spacing: .5px;
      transition: background .2s, border-color .2s, transform .15s;
      backdrop-filter: blur(6px);
    }
    .nav-btn:hover {
      background: rgba(255,105,180,.2);
      border-color: rgba(255,105,180,.65);
      transform: translateY(-2px);
    }
    .nav-back { left: 22px; }
    .nav-fwd  { right: 22px; }
  </style>
</head>
<body>

  <header>
    <span class="header-emoji">🐱</span>
    <h1>Du hast die Katze gefunden!</h1>
    <p class="subtitle">Jetzt: Memory &nbsp;✨</p>
  </header>

  <div class="stats">
    <div>Züge: <strong id="moves">0</strong></div>
    <div>Gefunden: <strong id="found">0</strong> / 8</div>
  </div>

  <div id="grid"></div>

  <!-- Navigation -->
  <button class="nav-btn nav-back" onclick="navigate('index.html')">←&nbsp;Zurück</button>
  <button class="nav-btn nav-fwd"  onclick="navigate('wheel.html')">Weiter&nbsp;→</button>

  <div id="win-screen">
    <div class="win-emoji">🎉</div>
    <div class="win-title">Gewonnen!</div>
    <p class="win-sub">Alle Paare gefunden in <strong id="win-moves"></strong> Zügen!</p>
    <button id="btn-next" onclick="goNext()">Weiter&nbsp;→</button>
  </div>

  <script>
    // Placeholder emojis — swap these out for real image paths later
    const PAIRS = ['🌸', '🦋', '🌙', '⭐', '🌺', '🎀', '🍭', '🐱'];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    const deck   = shuffle([...PAIRS, ...PAIRS]);
    const grid   = document.getElementById('grid');
    let flipped  = [];
    let locked   = false;
    let moves    = 0;
    let found    = 0;

    deck.forEach((symbol, idx) => {
      const card = document.createElement('div');
      card.className  = 'card';
      card.dataset.symbol = symbol;
      card.dataset.idx    = idx;

      card.innerHTML = `
        <div class="card-inner">
          <div class="card-face card-back">
            <div class="card-back-inner">✦</div>
          </div>
          <div class="card-face card-front">${symbol}</div>
        </div>
      `;

      card.addEventListener('click', () => onCardClick(card));
      grid.appendChild(card);
    });

    function onCardClick(card) {
      if (locked)                             return;
      if (card.classList.contains('flipped')) return;
      if (card.classList.contains('matched')) return;
      if (flipped.length === 2)               return;

      card.classList.add('flipped');
      flipped.push(card);

      if (flipped.length < 2) return;

      // Two cards flipped — check for match
      moves++;
      document.getElementById('moves').textContent = moves;
      locked = true;

      const [a, b] = flipped;

      if (a.dataset.symbol === b.dataset.symbol) {
        a.classList.add('matched');
        b.classList.add('matched');
        found++;
        document.getElementById('found').textContent = found;
        flipped = [];
        locked  = false;

        if (found === PAIRS.length) {
          setTimeout(showWin, 600);
        }
      } else {
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          flipped = [];
          locked  = false;
        }, 1000);
      }
    }

    function showWin() {
      document.getElementById('win-moves').textContent = moves;
      document.getElementById('win-screen').classList.add('visible');
    }

    function navigate(url) {
      document.body.style.transition = 'opacity .35s';
      document.body.style.opacity    = '0';
      setTimeout(() => { window.location.href = url; }, 360);
    }

    function goNext() { navigate('wheel.html'); }
  </script>

</body>
</html>
